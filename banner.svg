<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Claude Code Starter Kit">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1115"/>
      <stop offset="100%" stop-color="#1b1f29"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)"/>
  <rect width="1200" height="4" fill="url(#accent)"/>

  <!-- terminal window, top right -->
  <g transform="translate(860,40)">
    <rect width="300" height="120" rx="10" fill="#171a21" stroke="#262a33" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="5" fill="#ef4444"/>
    <circle cx="38" cy="20" r="5" fill="#f59e0b"/>
    <circle cx="56" cy="20" r="5" fill="#22c55e"/>
    <text x="20" y="55" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#9aa1ac">$ claude</text>
    <text x="20" y="80" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#6366f1">&gt; make the nav toggle work</text>
    <text x="20" y="100" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#4ade80">✓ reviewing diff…</text>
  </g>

  <!-- title -->
  <text x="60" y="100" font-family="Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#f4f5f7">Claude Code Starter Kit</text>
  <text x="60" y="136" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#9aa1ac">Learn AI-assisted development, one iteration at a time.</text>

  <!-- iteration progress indicator -->
  <g transform="translate(60,180)" font-family="Helvetica, Arial, sans-serif" font-size="14">
    <circle cx="10" cy="0" r="9" fill="#3a3f4b"/>
    <text x="28" y="5" fill="#c3c7ce">1 · Make it work</text>

    <line x1="150" y1="0" x2="185" y2="0" stroke="#3a3f4b" stroke-width="2"/>

    <circle cx="200" cy="0" r="9" fill="#6366f1"/>
    <text x="218" y="5" fill="#c3c7ce">2 · Make it right</text>

    <line x1="345" y1="0" x2="380" y2="0" stroke="#3a3f4b" stroke-width="2"/>

    <circle cx="395" cy="0" r="9" fill="#22c55e"/>
    <text x="413" y="5" fill="#c3c7ce">3 · Make it great</text>
  </g>
</svg>
